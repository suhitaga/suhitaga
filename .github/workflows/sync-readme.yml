name: Sync README to suhitaga.github.io

on:
  push:
    branches: [master]
    paths: [README.md]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          repository: suhitaga/suhitaga.github.io
          token: ${{ secrets.SYNC_README_TOKEN }}
          path: target

      - name: Copy README
        run: cp README.md target/README.md

      - name: Commit and push if changed
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git add README.md
          git commit -m "Sync README from suhitaga/suhitaga@${GITHUB_SHA::7}"
          git push
